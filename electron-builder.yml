appId: com.managerpro.app
productName: Manager Pro
directories:
  buildResources: assets
files:
  - from: dist
    to: .
  - from: get-work-hours.ps1
    to: .
  - node_modules

win:
  target:
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

portable:
  artifactName: ${productName}-${version}.exe

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity

linux:
  target:
    - AppImage
    - deb
  category: Office
